let coders=[]; // {coder, map:{id->true/false/null}}
const drop=document.getElementById('drop'), file=document.getElementById('file');
drop.addEventListener('dragover',e=>{e.preventDefault();drop.style.background='#eef2fb';});
drop.addEventListener('dragleave',()=>drop.style.background='');
drop.addEventListener('drop',e=>{e.preventDefault();drop.style.background='';[...e.dataTransfer.files].forEach(readFile);});
file.addEventListener('change',e=>[...e.target.files].forEach(readFile));
function readFile(f){ const r=new FileReader(); r.onload=()=>{ try{addObj(JSON.parse(r.result));}catch(err){alert('Could not parse '+f.name);} }; r.readAsText(f); }
function addPaste(){ const t=document.getElementById('paste'); try{addObj(JSON.parse(t.value));t.value='';}catch(e){alert('Invalid JSON');} }
function addObj(o){ if(!o||!o.answers){alert('Not a coder results file');return;}
  const map={}; o.answers.forEach(a=>map[a.id]=a.human);
  // capture model labels from any file
  o.answers.forEach(a=>{ if(!(a.id in MODEL)) MODEL[a.id]=a.model_threat; });
  coders.push({coder:o.coder||('coder'+(coders.length+1)), map}); renderLoaded(); compute(); }
const MODEL={};
function renderLoaded(){ document.getElementById('loaded').innerHTML=coders.length?('Loaded: '+coders.map((c,k)=>'<span class="pill">'+escapeHtml(c.coder)+' <a href="#" onclick="rm('+k+');return false">&times;</a></span>').join('')):''; }
function rm(k){ coders.splice(k,1); renderLoaded(); compute(); }
function reset(){ coders=[]; renderLoaded(); document.getElementById('out').innerHTML=''; }
function escapeHtml(s){return (''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function maj(votes){ // votes: array of true/false ; returns {label, tie}
  let t=votes.filter(v=>v===true).length, n=votes.filter(v=>v===false).length;
  if(t===n) return {label:null,tie:true}; return {label:t>n, tie:false}; }
function compute(){
  const out=document.getElementById('out'); if(coders.length===0){out.innerHTML='';return;}
  const ids=Object.keys(MODEL);
  // per-coder vs model
  let html='<div class="card"><h2>Each coder vs. the model</h2><table><tr><th>Coder</th><th>Coded</th><th>Agree w/ model</th><th>Precision</th><th>Recall</th></tr>';
  coders.forEach(c=>{ let tp=0,fp=0,tn=0,fn=0,ag=0,n=0;
    ids.forEach(id=>{ const h=c.map[id]; if(h!==true&&h!==false)return; const m=MODEL[id]; n++; if(h===m)ag++;
      if(m&&h)tp++; else if(m&&!h)fp++; else if(!m&&!h)tn++; else fn++; });
    const prec=(tp+fp)?tp/(tp+fp):0, rec=(tp+fn)?tp/(tp+fn):0;
    html+='<tr><td>'+escapeHtml(c.coder)+'</td><td>'+n+'</td><td>'+(n?(100*ag/n).toFixed(1):'-')+'%</td><td>'+(100*prec).toFixed(0)+'%</td><td>'+(100*rec).toFixed(0)+'%</td></tr>'; });
  html+='</table></div>';
  // pairwise inter-coder agreement
  if(coders.length>=2){
    html+='<div class="card"><h2>Inter-coder agreement (human vs. human)</h2><table><tr><th></th>'+coders.map(c=>'<th>'+escapeHtml(c.coder)+'</th>').join('')+'</tr>';
    let sumAg=0,sumK=0,pairs=0;
    coders.forEach((a,ai)=>{ html+='<tr><th>'+escapeHtml(a.coder)+'</th>';
      coders.forEach((b,bi)=>{ if(bi<=ai){html+='<td class="muted">&middot;</td>';return;}
        let ag=0,n=0,tt=0,aT=0,bT=0;
        ids.forEach(id=>{ const x=a.map[id],y=b.map[id]; if((x!==true&&x!==false)||(y!==true&&y!==false))return; n++; if(x===y)ag++; if(x)aT++; if(y)bT++; });
        const po=n?ag/n:0, pe=n?((aT/n)*(bT/n)+(1-aT/n)*(1-bT/n)):0, k=(1-pe)?(po-pe)/(1-pe):0;
        sumAg+=po;sumK+=k;pairs++;
        html+='<td>'+(100*po).toFixed(0)+'%<br><span class="muted">&kappa;='+k.toFixed(2)+'</span></td>'; });
      html+='</tr>'; });
    html+='</table><p class="muted">Mean pairwise agreement '+(100*sumAg/pairs).toFixed(1)+'% &middot; mean Cohen&#39;s &kappa; '+(sumK/pairs).toFixed(3)+'</p></div>';
  }
  // human consensus + model vs consensus
  let tp=0,fp=0,tn=0,fn=0,ag=0,n=0,ties=0; const contested=[];
  ids.forEach(id=>{ const votes=coders.map(c=>c.map[id]).filter(v=>v===true||v===false); if(votes.length===0)return;
    const m=maj(votes); if(m.tie){ties++; contested.push({id,votes}); return;}
    const ml=MODEL[id]; n++; if(ml===m.label)ag++; else contested.push({id,votes,model:ml,cons:m.label});
    if(ml&&m.label)tp++; else if(ml&&!m.label)fp++; else if(!ml&&!m.label)tn++; else fn++; });
  const prec=(tp+fp)?tp/(tp+fp):0, rec=(tp+fn)?tp/(tp+fn):0, f1=(prec+rec)?2*prec*rec/(prec+rec):0;
  html+='<div class="card"><h2>Model vs. human consensus (majority vote)</h2>'+
    '<div class="metrics"><div class="metric"><div class="v">'+(n?(100*ag/n).toFixed(1):'-')+'%</div><div class="l">Accuracy</div></div>'+
    '<div class="metric"><div class="v">'+(100*prec).toFixed(0)+'%</div><div class="l">Precision</div></div>'+
    '<div class="metric"><div class="v">'+(100*rec).toFixed(0)+'%</div><div class="l">Recall</div></div></div>'+
    '<table><tr><th></th><th>Consensus: Threat</th><th>Consensus: Not</th></tr>'+
    '<tr><th>Model: Threat</th><td>'+tp+'</td><td>'+fp+'</td></tr><tr><th>Model: Not</th><td>'+fn+'</td><td>'+tn+'</td></tr></table>'+
    '<p class="muted">'+n+' items with a majority; '+ties+' tied (excluded). F1='+f1.toFixed(3)+'</p></div>';
  // contested / disagreement table
  html+='<div class="card"><h2>Contested &amp; model-disagreement items</h2><table><tr><th>Post</th>'+coders.map(c=>'<th>'+escapeHtml(c.coder)+'</th>').join('')+'<th>Model</th></tr>';
  const seen=new Set();
  ids.forEach(id=>{ const votes=coders.map(c=>c.map[id]).filter(v=>v===true||v===false);
    const dist=new Set(votes); const m=maj(votes);
    const humanSplit = dist.size>1; const modelDiff = !m.tie && MODEL[id]!==m.label;
    if(!(humanSplit||modelDiff)||votes.length<1)return;
    const txt=(IDTEXT[id]||'').slice(0,160);
    html+='<tr class="contest"><td style="text-align:left;max-width:320px">'+escapeHtml(txt)+'</td>'+
      coders.map(c=>{const h=c.map[id]; return '<td>'+(h===true?'T':h===false?'N':'&middot;')+'</td>';}).join('')+
      '<td>'+(MODEL[id]?'T':'N')+'</td></tr>'; });
  html+='</table><p class="muted">T = threat, N = not. Rows shown where coders split or the model differs from consensus.</p></div>';
  out.innerHTML=html;
}
